<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi AI Agent Hub</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body class="no-transition">
  <div class="container">
    <header>
      <h1>Multi AI Agent Hub</h1>
    </header>

    <div class="input-section">
      <textarea id="prompt-input" placeholder="输入提示词..."></textarea>
      
      <div class="image-upload-wrapper">
        <label for="image-upload" class="upload-btn">
          <span>+ 添加图片</span>
          <input type="file" id="image-upload" accept="image/*" />
        </label>
        <div id="image-preview-container" class="hidden">
          <img id="image-preview" src="" alt="预览" />
          <button id="remove-image-btn" title="移除图片">×</button>
        </div>
      </div>
    </div>

    <div class="agents-section">
      <h3>选择 Agent</h3>
      <div class="agent-list">
        <!-- DeepSeek -->
        <div class="agent-item">
          <label class="switch">
            <input type="checkbox" id="agent-deepseek" value="deepseek" checked>
            <span class="slider round"></span>
          </label>
          <span class="agent-name">DeepSeek</span>
        </div>
        <!-- 豆包 -->
        <div class="agent-item">
          <label class="switch">
            <input type="checkbox" id="agent-doubao" value="doubao" checked>
            <span class="slider round"></span>
          </label>
          <span class="agent-name">豆包 (Doubao)</span>
        </div>
        <!-- Kimi -->
        <div class="agent-item">
          <label class="switch">
            <input type="checkbox" id="agent-kimi" value="kimi" checked>
            <span class="slider round"></span>
          </label>
          <span class="agent-name">Kimi</span>
        </div>
      </div>
    </div>

    <div class="submit-actions">
      <button id="submit-btn" class="primary-btn">提交到选中 Agent</button>
      <button id="stop-btn" class="primary-btn stop-btn hidden">停止执行</button>
    </div>

    <div class="results-section" id="results-container">
      <!-- 结果卡片会动态插入到这里 -->
    </div>

    <div class="footer-actions">
      <button id="clear-history-btn" class="text-btn" title="清空生成的历史结果">🗑 清除历史</button>
      <button id="reload-btn" class="text-btn" title="点击刷新整个插件（包括后台脚本）">↻ 刷新插件</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
